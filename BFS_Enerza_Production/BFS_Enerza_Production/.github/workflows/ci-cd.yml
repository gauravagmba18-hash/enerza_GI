name: BFS Enerza CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}/enerza-api

jobs:
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       enerza_test
          POSTGRES_USER:     enerza
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run linter
        working-directory: backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://enerza:test_password@localhost:5432/enerza_test
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   test-secret-key-for-ci-only
          DEBUG:        "true"
        run: |
          coverage run -m pytest tests/ -v --tb=short
          coverage report --min-coverage=75
          coverage xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context:   backend
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: deploy
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/bfs-enerza
            git pull origin develop
            docker-compose pull api worker
            docker-compose up -d --no-deps api worker
            docker-compose exec -T api alembic upgrade head
            echo "Staging deploy complete: $(date)"

      - name: Smoke test staging
        run: |
          sleep 15
          curl -f https://staging.bfsenerza.in/health || exit 1
          echo "Staging health check passed"

  # ──────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        run: echo "Deploying ${{ github.sha }} to production at $(date)"

      - name: Deploy to production (blue-green)
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: deploy
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/bfs-enerza
            git pull origin main

            # Pull new images
            docker-compose pull api worker

            # Run DB migrations before swapping traffic
            docker-compose run --rm api alembic upgrade head

            # Rolling restart — zero downtime
            docker-compose up -d --no-deps --scale api=2 api
            sleep 20
            docker-compose up -d --no-deps api
            docker-compose up -d --no-deps worker

            echo "Production deploy complete: $(date)"

      - name: Production health check
        run: |
          sleep 20
          for i in 1 2 3; do
            curl -f https://app.bfsenerza.in/health && echo "Health OK" && exit 0
            sleep 10
          done
          echo "Health check failed — alerting on-call"
          exit 1

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "BFS Enerza production deploy: ${{ job.status }} | ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
