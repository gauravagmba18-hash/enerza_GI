version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: enerza_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       enerza_db
      POSTGRES_USER:     enerza
      POSTGRES_PASSWORD: ${DB_PASSWORD:-enerza_dev_pwd_change_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enerza -d enerza_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enerza_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pwd}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enerza_api
    restart: unless-stopped
    environment:
      DATABASE_URL:     postgresql://enerza:${DB_PASSWORD:-enerza_dev_pwd_change_in_prod}@db:5432/enerza_db
      REDIS_URL:        redis://:${REDIS_PASSWORD:-redis_dev_pwd}@redis:6379/0
      SECRET_KEY:       ${SECRET_KEY:-change-this-32-char-secret-key-now}
      DEBUG:            ${DEBUG:-false}
      RAZORPAY_KEY_ID:  ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      BBPS_AGENT_ID:    ${BBPS_AGENT_ID:-}
      BBPS_API_KEY:     ${BBPS_API_KEY:-}
      FCM_SERVER_KEY:   ${FCM_SERVER_KEY:-}
      SMS_API_KEY:      ${SMS_API_KEY:-}
      SMTP_USER:        ${SMTP_USER:-}
      SMTP_PASS:        ${SMTP_PASS:-}
      AWS_ACCESS_KEY:   ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY:   ${AWS_SECRET_KEY:-}
    volumes:
      - ./backend:/app
      - bill_pdfs:/app/bill_pdfs
    ports:
      - "8000:8000"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enerza_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://enerza:${DB_PASSWORD:-enerza_dev_pwd_change_in_prod}@db:5432/enerza_db
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_dev_pwd}@redis:6379/0
      SECRET_KEY:   ${SECRET_KEY:-change-this-32-char-secret-key-now}
    volumes:
      - ./backend:/app
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    container_name: enerza_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
      - bill_pdfs:/usr/share/nginx/bills:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s

volumes:
  postgres_data:
  redis_data:
  bill_pdfs:
