worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api_general:10m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=api_payment:10m  rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m     rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream API server
    upstream enerza_api {
        server api:8000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl http2;
        server_name app.bfsenerza.in;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_conn conn_limit 20;

        # Health check (no auth)
        location /health {
            proxy_pass         http://enerza_api/health;
            proxy_set_header   Host $host;
            access_log off;
        }

        # Auth endpoints — strict rate limit
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass         http://enerza_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Payment callback — medium rate limit
        location /api/v1/payments/ {
            limit_req zone=api_payment burst=10 nodelay;
            proxy_pass         http://enerza_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass         http://enerza_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 10M;
        }

        # API docs (restrict to internal IPs in production)
        location /api/docs {
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass http://enerza_api/api/docs;
        }

        # Bill PDFs (served directly by nginx for performance)
        location /bills/ {
            alias  /usr/share/nginx/bills/;
            auth_request /api/v1/auth/verify-bill-access;
            add_header Content-Disposition "attachment";
        }

        # MDM Frontend (static HTML app)
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|ico|woff2)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
