
<style>
#erd1 svg { max-width:100%; }
#erd1 svg.erDiagram .row-rect-odd path,
#erd1 svg.erDiagram .row-rect-odd rect,
#erd1 svg.erDiagram .row-rect-even path,
#erd1 svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd1" style="overflow-x:auto;padding:4px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({startOnLoad:false,theme:'base',fontFamily:'"Anthropic Sans",sans-serif',themeVariables:{darkMode:dark,fontSize:'13px',fontFamily:'"Anthropic Sans",sans-serif',lineColor:dark?'#9c9a92':'#73726c',textColor:dark?'#c2c0b6':'#3d3d3a'}});
const {svg} = await mermaid.render('erd1-svg',`erDiagram
    CUSTOMER ||--o{ ACCOUNT : "has"
    CUSTOMER }|--|| CONSUMER_SEGMENT : "belongs to"
    ACCOUNT }|--|| PREMISE : "located at"
    ACCOUNT ||--o{ SERVICE_CONNECTION : "billed through"
    SERVICE_CONNECTION ||--o| GAS_CONN_DETAIL : "gas"
    SERVICE_CONNECTION ||--o| ELEC_CONN_DETAIL : "electricity"
    SERVICE_CONNECTION ||--o| WATER_CONN_DETAIL : "water"
    GAS_CONN_DETAIL }|--|| PRESSURE_BAND : "classified by"

    CUSTOMER {
        varchar customer_id PK
        varchar full_name
        varchar customer_type
        varchar kyc_status
        varchar pan_ref
        varchar aadhaar_ref
        varchar mobile
        varchar email
        varchar status
    }
    PREMISE {
        varchar premise_id PK
        varchar address_line1
        varchar address_line2
        varchar area_id FK
        decimal geo_lat
        decimal geo_lon
        varchar building_type
        varchar status
    }
    ACCOUNT {
        varchar account_id PK
        varchar customer_id FK
        varchar premise_id FK
        varchar cycle_id FK
        varchar bill_delivery_mode
        varchar status
        date effective_from
    }
    CONSUMER_SEGMENT {
        varchar segment_id PK
        varchar segment_name
        varchar utility_type
        varchar description
    }
    SERVICE_CONNECTION {
        varchar connection_id PK
        varchar account_id FK
        varchar utility_type
        varchar segment_id FK
        date start_date
        date end_date
        varchar status
    }
    GAS_CONN_DETAIL {
        varchar connection_id PK
        varchar service_type
        varchar pressure_band_id FK
        varchar regulator_serial
    }
    ELEC_CONN_DETAIL {
        varchar connection_id PK
        decimal load_kw
        varchar supply_voltage
        varchar phase_type
        varchar tariff_category
    }
    WATER_CONN_DETAIL {
        varchar connection_id PK
        decimal pipe_size_mm
        varchar supply_zone_id FK
        varchar meter_type
    }
    PRESSURE_BAND {
        varchar band_id PK
        varchar band_name
        decimal min_pressure
        decimal max_pressure
        varchar usage_class
    }
`);
document.getElementById('erd1').innerHTML = svg;
document.querySelectorAll('#erd1 svg.erDiagram .node').forEach(node=>{
  const p=node.querySelector('path[d]');if(!p)return;
  const d=p.getAttribute('d'),nums=d.match(/-?[\d.]+/g)?.map(Number);
  if(!nums||nums.length<8)return;
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style'])if(p.hasAttribute(a))r.setAttribute(a,p.getAttribute(a));
  p.replaceWith(r);
});
document.querySelectorAll('#erd1 svg.erDiagram .row-rect-odd path,#erd1 svg.erDiagram .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
